# Render Blueprint - 使用 ghcr.io 预构建镜像部署
# 使用方法：在 Render 界面连接 GitHub 仓库后选择 "Use Blueprint" 即可

services:
  - type: web
    name: test-center
    env: docker
    region: singapore
    plan: free
    image:
      url: ghcr.io/c101888/test-center:latest
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
    healthCheckPath: /
    autoDeploy: true

  - type: web
    name: demo-project
    env: docker
    region: singapore
    plan: free
    image:
      url: ghcr.io/c101888/demo-project:latest
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4010"
    healthCheckPath: /
    autoDeploy: true

# Render Blueprint - 使用 ghcr.io 预构建镜像部署
services:
  - type: web
    name: test-center
    runtime: image
    image:
      imagePath: ghcr.io/c101888/test-center:latest
    region: singapore
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
    healthCheckPath: /
    autoDeploy: true

  - type: web
    name: demo-project
    runtime: image
    image:
      imagePath: ghcr.io/c101888/demo-project:latest
    region: singapore
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4010"
    healthCheckPath: /
    autoDeploy: true

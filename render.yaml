# Render Blueprint - Node 原生运行时（不用 Docker）
services:
  - type: web
    name: test-center
    runtime: node
    repo: https://github.com/c101888/ai-test-1
    branch: main
    rootDir: test-center
    region: singapore
    plan: free
    buildCommand: npm ci || npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
    healthCheckPath: /
    autoDeploy: true

  - type: web
    name: demo-project
    runtime: node
    repo: https://github.com/c101888/ai-test-1
    branch: main
    rootDir: demo-project
    region: singapore
    plan: free
    buildCommand: npm ci || npm install
    startCommand: npx prisma db push && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4010"
    healthCheckPath: /
    autoDeploy: true

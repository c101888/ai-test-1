# Render Blueprint - Docker 构建（用 webpack 而非 Turbopack）
services:
  - type: web
    name: test-center
    runtime: docker
    repo: https://github.com/c101888/ai-test-1
    branch: main
    rootDir: test-center
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
    healthCheckPath: /
    autoDeploy: true

  - type: web
    name: demo-project
    runtime: docker
    repo: https://github.com/c101888/ai-test-1
    branch: main
    rootDir: demo-project
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4010"
    healthCheckPath: /
    autoDeploy: true
